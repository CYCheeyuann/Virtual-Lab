AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Virtual Science Lab Assistant — Streaming Lambda + Bedrock + S3

Parameters:
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin (set to S3 website URL after first deploy)
  ApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: |
      Optional shared secret. When set, every Lambda Function URL requires
      `X-Api-Key: <value>` on the request. Empty string disables the check.

Globals:
  Function:
    Timeout: 180
    MemorySize: 512
    Runtime: python3.12
    Environment:
      Variables:
        ALLOWED_ORIGIN: !Ref AllowedOrigin
        API_KEY:        !Ref ApiKey

Resources:
  # ─── IAM Role ───────────────────────────────────────────────────────────────
  AppBedrockRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-BedrockRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Claude Haiku 4.5 — invoked through the GLOBAL inference profile
              # from any region (we call it from ap-southeast-1).
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
              # Image generation in us-east-1 — IAM allows BOTH Titan v2 and
              # Nova Canvas so the runtime model can be switched via the
              # IMAGE_MODEL_ID env var alone, no IAM redeploy required.
              # (Titan v2 is Legacy / EOL 2026-06-30; Nova Canvas is the
              # supported successor.)
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-image-generator-v2:0"
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-image-generator-v1"
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-canvas-v1:0"
              # Stability AI SD 3.5 Large in us-west-2 — used by the
              # Scientific Object Generator (Lab Tools redesign).
              # NOTE: account-level model access must also be granted via the
              # Bedrock console (Model access → Stability AI → Stable Diffusion 3.5 Large).
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:us-west-2::foundation-model/stability.sd3-5-large-v1:0"
                  - "arn:aws:bedrock:us-west-2::foundation-model/stability.stable-diffusion-xl-v1"

  # ─── Chapter Assistant Lambda ───────────────────────────────────────────────
  ChapterAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/chapter_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Experiment Guide Lambda ────────────────────────────────────────────────
  ExperimentGuideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/experiment_guide/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Science Quiz Lambda ────────────────────────────────────────────────────
  ScienceQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_quiz/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Flashcard Generator Lambda ─────────────────────────────────────────────
  # Stateless AI card generation: from_text / from_quiz / from_topic.
  # Buffered (non-streaming) — frontend wants the whole deck JSON in one shot.
  FlashcardGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/flashcard_generator/
      Handler: run.sh
      MemorySize: 512
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── Scientific Object Generator Lambda (Lab Tools redesign) ────────────────
  # Three modes: overview (Claude Haiku) → image (Stability SD 3.5 Large in
  # us-west-2) → narrative (Claude Haiku). Strictly sequential per the spec.
  # Memory bumped to 1024 because base64 images can be ~1.5 MB.
  # Timeout 300s — image gen on Stability can take 30-60s.
  ScientificObjectGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/scientific_object_generator/
      Handler: run.sh
      MemorySize: 1024
      Timeout: 300
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── Science Tutor Lambda ──────────────────────────────────────────────────
  ScienceTutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_tutor/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Safety Assistant Lambda (Streaming) ───────────────────────────────────
  SafetyAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/safety_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── What Happens If Lambda (Streaming) ────────────────────────────────────
  WhatHappensIfFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/what_happens_if/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Image Generator Lambda (Non-Streaming, Nova Canvas + Claude) ──────────
  ImageGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/image_generator/
      Handler: run.sh
      MemorySize: 1024
      Timeout: 300
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          # Claude (text) runs in Singapore via global inference profile.
          BEDROCK_REGION: ap-southeast-1
          MODEL_ID: global.anthropic.claude-haiku-4-5-20251001-v1:0
          # Stability AI SD 3.5 Large in us-west-2.
          # Account 298493766605 has SD 3.5 Marketplace agreement signed; it
          # does NOT have Titan v2 enabled in us-east-1, hence the swap.
          # IAM grants both Titan/Nova ARNs (us-east-1) and SD 3.5 (us-west-2)
          # so to flip back, change just the env vars below.
          IMAGE_REGION: us-west-2
          IMAGE_MODEL_ID: stability.sd3-5-large-v1:0
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── S3 Frontend Bucket ────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ─── CloudFront distribution — fronts the S3 website with HTTPS ─────────────
  # Free TLS cert via *.cloudfront.net default certificate, no custom domain
  # needed. PriceClass_100 keeps cost minimal (US/EU/Canada/Israel/HK edges).
  # First deploy provisioning takes ~10-15 min as the distribution propagates
  # to edge locations; subsequent updates are fast.
  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} — frontend HTTPS"
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: S3WebsiteOrigin
            # Use the S3 *website* endpoint (not the REST endpoint) so the
            # IndexDocument / ErrorDocument behaviour configured on the bucket
            # is honoured for clean URLs and SPA-style fallbacks.
            DomainName: !Sub "${FrontendBucket}.s3-website-${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              # S3 website endpoints are HTTP-only; CloudFront speaks HTTPS to
              # the viewer regardless. The bucket itself stays public-read.
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods:  [GET, HEAD]
          Compress: true
          # AWS-managed CachingOptimized policy (TTL 86400, gzip+brotli).
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # SPA-friendly: 403/404 from the bucket falls back to index.html
        # so deep links work even though the static site has multiple pages.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  ChapterAssistantUrl:
    Value: !GetAtt ChapterAssistantFunctionUrl.FunctionUrl
  ExperimentGuideUrl:
    Value: !GetAtt ExperimentGuideFunctionUrl.FunctionUrl
  ScienceQuizUrl:
    Value: !GetAtt ScienceQuizFunctionUrl.FunctionUrl
  ScienceTutorUrl:
    Value: !GetAtt ScienceTutorFunctionUrl.FunctionUrl
  FlashcardGeneratorUrl:
    Value: !GetAtt FlashcardGeneratorFunctionUrl.FunctionUrl
  ScientificObjectGeneratorUrl:
    Value: !GetAtt ScientificObjectGeneratorFunctionUrl.FunctionUrl
  SafetyAssistantUrl:
    Value: !GetAtt SafetyAssistantFunctionUrl.FunctionUrl
  WhatHappensIfUrl:
    Value: !GetAtt WhatHappensIfFunctionUrl.FunctionUrl
  ImageGeneratorUrl:
    Value: !GetAtt ImageGeneratorFunctionUrl.FunctionUrl
  WebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  CloudFrontUrl:
    Description: HTTPS URL of the CloudFront distribution (use this in production)
    Value: !Sub "https://${WebsiteDistribution.DomainName}"
  CloudFrontDistributionId:
    Description: Distribution ID — needed for cache invalidations after S3 sync
    Value: !Ref WebsiteDistribution
  BucketName:
    Value: !Ref FrontendBucket
