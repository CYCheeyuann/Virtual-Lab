name: Deploy Virtual Science Lab Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Copy shared module into each Lambda for packaging
        run: |
          for fn in chapter_assistant experiment_guide science_quiz science_tutor; do
            cp lambdas/shared/*.py "lambdas/${fn}/"
          done

      - name: SAM Build
        run: sam build --template infra/template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name virtual-science-lab-assistant \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ap-southeast-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Inject Lambda URLs into frontend config
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name virtual-science-lab-assistant \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          URL=$(get_output ChapterAssistantUrl)
          sed -i "s|__URL_CHAPTER_ASSISTANT__|$URL|g" frontend/config.js

          URL=$(get_output ExperimentGuideUrl)
          sed -i "s|__URL_EXPERIMENT_GUIDE__|$URL|g" frontend/config.js

          URL=$(get_output ScienceQuizUrl)
          sed -i "s|__URL_SCIENCE_QUIZ__|$URL|g" frontend/config.js

          URL=$(get_output ScienceTutorUrl)
          sed -i "s|__URL_SCIENCE_TUTOR__|$URL|g" frontend/config.js

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name virtual-science-lab-assistant \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          aws s3 sync frontend/ s3://$BUCKET/ --cache-control no-cache
