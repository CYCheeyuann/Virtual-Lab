AWSTemplateFormatVersion: "2010-09-09"
Description: |
  CloudFront-scoped WAFv2 WebACL for Virtual Science Lab.
  MUST be deployed in us-east-1 (CloudFront scope requirement).

Parameters:
  StackPrefix:
    Type: String
    Default: virtual-science-lab-assistant
  RatePerFiveMin:
    Type: Number
    Default: 600
    Description: Per-IP request budget in any 5-minute window.

Resources:
  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${StackPrefix}-cf-acl"
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${StackPrefix}-cf-acl"
      Rules:
        - Name: RateLimitPerIP
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref RatePerFiveMin
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitPerIP
        - Name: AWSCommonRules
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSCommonRules
        - Name: AWSKnownBadInputs
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSKnownBadInputs
        - Name: AWSAnonymousIPList
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAnonymousIpList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSAnonymousIPList

Outputs:
  WebACLArn:
    Description: Pass this ARN as CloudFrontWebACLArn to the main stack.
    Value: !GetAtt WebACL.Arn
    Export:
      Name: !Sub "${StackPrefix}-cf-webacl-arn"
