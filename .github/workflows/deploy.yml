name: Deploy Virtual Science Lab Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        type: choice
        options: [dev, staging, prod]
        default: prod

jobs:
  # ─── Quality gate ───────────────────────────────────────────────────────
  # Runs lint + pytest + the eval smoke harness on every push. Deploy is
  # gated on this job passing. If any step here fails, the deploy job
  # downstream never runs.
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Lint (ruff)
        run: ruff check lambdas tests eval

      - name: Run pytest
        run: pytest -ra

      - name: Eval smoke (one sample per Lambda, mocked Bedrock)
        run: python -m eval.run --smoke

  # ─── Deploy (gated on quality) ──────────────────────────────────────────
  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve environment + stack name
        id: env
        run: |
          # workflow_dispatch passes an explicit environment input. A push to
          # main has no input, so default to prod. Prod keeps the legacy
          # stack name so the live deployment is preserved; dev/staging get
          # their own stacks alongside.
          ENV="${{ github.event.inputs.environment }}"
          ENV="${ENV:-prod}"
          if [ "$ENV" = "prod" ]; then
            STACK="virtual-science-lab-assistant"
          else
            STACK="virtual-science-lab-${ENV}"
          fi
          echo "environment=$ENV"      >> "$GITHUB_OUTPUT"
          echo "stack_name=$STACK"     >> "$GITHUB_OUTPUT"
          echo "Deploying environment=$ENV stack=$STACK"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Copy shared module into each Lambda for packaging
        run: |
          for fn in chapter_assistant experiment_guide science_quiz science_tutor \
                    safety_assistant what_happens_if image_generator \
                    flashcard_generator scientific_object_generator \
                    feedback_collector; do
            cp lambdas/shared/*.py "lambdas/${fn}/"
          done

      - name: SAM Build
        run: sam build --template infra/template.yaml

      - name: Resolve AllowedOrigin from existing stack (if any)
        id: origin
        env:
          STACK_NAME: ${{ steps.env.outputs.stack_name }}
        run: |
          # Prefer the CloudFront HTTPS URL once the distribution exists, so
          # CORS is locked to the production HTTPS origin. Falls back to the
          # S3 website URL on first deploy (before CloudFront is provisioned),
          # then to "*" on the very first deploy when neither output exists.
          set +e
          CF_URL=$(aws cloudformation describe-stacks \
                  --stack-name "$STACK_NAME" \
                  --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
                  --output text 2>/dev/null)
          S3_URL=$(aws cloudformation describe-stacks \
                  --stack-name "$STACK_NAME" \
                  --query "Stacks[0].Outputs[?OutputKey=='WebsiteUrl'].OutputValue" \
                  --output text 2>/dev/null)
          set -e
          if [ -n "$CF_URL" ] && [ "$CF_URL" != "None" ]; then
            URL="$CF_URL"
          elif [ -n "$S3_URL" ] && [ "$S3_URL" != "None" ]; then
            URL="$S3_URL"
          else
            URL="*"
          fi
          echo "value=$URL" >> "$GITHUB_OUTPUT"
          echo "Using AllowedOrigin=$URL"

      - name: SAM Deploy
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ALLOWED_ORIGIN: ${{ steps.origin.outputs.value }}
          BUDGET_EMAIL: ${{ secrets.BUDGET_NOTIFICATION_EMAIL }}
          BUDGET_AMOUNT: ${{ secrets.BUDGET_AMOUNT_USD }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
          STACK_NAME: ${{ steps.env.outputs.stack_name }}
        run: |
          # Build --parameter-overrides as a list. SAM rejects empty values
          # like `ApiKey=`, so we only include each one when it's set.
          OVERRIDES="AllowedOrigin=$ALLOWED_ORIGIN Environment=$ENVIRONMENT"
          if [ -n "$API_KEY" ]; then
            OVERRIDES="$OVERRIDES ApiKey=$API_KEY"
          fi
          if [ -n "$BUDGET_EMAIL" ]; then
            OVERRIDES="$OVERRIDES BudgetNotificationEmail=$BUDGET_EMAIL"
          fi
          if [ -n "$BUDGET_AMOUNT" ]; then
            OVERRIDES="$OVERRIDES BudgetAmountUSD=$BUDGET_AMOUNT"
          fi
          sam deploy \
            --stack-name "$STACK_NAME" \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ap-southeast-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides $OVERRIDES

      - name: Inject Lambda URLs into frontend config
        env:
          API_KEY: ${{ secrets.API_KEY }}
          STACK_NAME: ${{ steps.env.outputs.stack_name }}
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          URL=$(get_output ChapterAssistantUrl)
          sed -i "s|__URL_CHAPTER_ASSISTANT__|$URL|g" frontend/config.js

          URL=$(get_output ExperimentGuideUrl)
          sed -i "s|__URL_EXPERIMENT_GUIDE__|$URL|g" frontend/config.js

          URL=$(get_output ScienceQuizUrl)
          sed -i "s|__URL_SCIENCE_QUIZ__|$URL|g" frontend/config.js

          URL=$(get_output ScienceTutorUrl)
          sed -i "s|__URL_SCIENCE_TUTOR__|$URL|g" frontend/config.js

          URL=$(get_output SafetyAssistantUrl)
          sed -i "s|__URL_SAFETY_ASSISTANT__|$URL|g" frontend/config.js

          URL=$(get_output WhatHappensIfUrl)
          sed -i "s|__URL_WHAT_HAPPENS_IF__|$URL|g" frontend/config.js

          URL=$(get_output ImageGeneratorUrl)
          sed -i "s|__URL_IMAGE_GENERATOR__|$URL|g" frontend/config.js

          URL=$(get_output FlashcardGeneratorUrl)
          sed -i "s|__URL_FLASHCARD_GENERATOR__|$URL|g" frontend/config.js

          URL=$(get_output ScientificObjectGeneratorUrl)
          sed -i "s|__URL_SCIENTIFIC_OBJECT_GENERATOR__|$URL|g" frontend/config.js

          URL=$(get_output FeedbackCollectorUrl)
          sed -i "s|__URL_FEEDBACK_COLLECTOR__|$URL|g" frontend/config.js

          # Inject the API key (or empty string) so the frontend sends X-Api-Key
          # on every fetch. Reading via $API_KEY env var lets Actions log-scrub
          # the value, and we use `#` as a delimiter to avoid clashing with `/`
          # or `|` characters that may appear in the secret.
          sed -i "s#__API_KEY__#${API_KEY}#g" frontend/config.js

      - name: Deploy frontend to S3
        env:
          STACK_NAME: ${{ steps.env.outputs.stack_name }}
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          aws s3 sync frontend/ s3://$BUCKET/ --cache-control no-cache

      - name: Invalidate CloudFront cache
        env:
          STACK_NAME: ${{ steps.env.outputs.stack_name }}
        run: |
          # CloudFront caches S3 responses at edge locations; without an
          # invalidation, viewers can keep seeing stale assets for the cache
          # TTL. Skip silently on the very first deploy (before the
          # distribution exists yet).
          set +e
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text 2>/dev/null)
          set -e
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            echo "Invalidating CloudFront distribution $DIST_ID"
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*" \
              --query 'Invalidation.Id' --output text
          else
            echo "No CloudFront distribution yet — skipping invalidation"
          fi
