<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📖 Chapter Assistant</title>
  <meta name="description" content="Generate a structured chapter overview for Biology, Chemistry, or Physics using AI." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="global-chat.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand">🔬 Virtual Science Lab</div>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="chapter.html">Chapter Assistant</a>
        <a class="nav-link" href="experiment.html">Experiment Guide</a>
        <a class="nav-link" href="quiz.html">Science Quiz</a>
        <a class="nav-link" href="tutor.html">Science Tutor</a>
        <a class="nav-link" href="lab-tools.html">Lab Tools</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>📖 Chapter Assistant</h1>
      <p>Pick a subject and get a structured overview of its main chapters and key concepts.</p>
    </div>

    <section class="card">
      <h2>Subject</h2>
      <label for="subject">Select Science Subject</label>
      <select id="subject" class="input">
        <option value="Biology">Biology</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Physics">Physics</option>
      </select>

      <div class="btn-row" style="margin-top:18px">
        <button id="runBtn" class="btn btn-primary"></button>
        <button id="resetBtn" class="btn btn-ghost"></button>
      </div>
    </section>

    <section class="card">
      <h2>📑 Chapter Overview</h2>
      <div class="output-panel text-panel" id="out-chapter">
        <div class="placeholder">Chapter overview will appear here…</div>
      </div>
      <div class="btn-row" style="margin-top:12px">
        <button id="exportBtn" class="btn btn-ghost btn-export"></button>
        <button id="sendToAiBtn" class="btn btn-ghost"></button>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="progress.js"></script>
  <script src="common.js"></script>
  <script src="global-chat.js"></script>
  <script>
    // Inject SVG icon buttons
    document.getElementById('runBtn').innerHTML   = `${iconHtml('bolt')}<span>Generate Overview</span>`;
    document.getElementById('resetBtn').innerHTML = `${iconHtml('refresh', 'btn-icon-rotate')}<span>Reset</span>`;
    document.getElementById('exportBtn').innerHTML= `${iconHtml('download')}<span>Export PDF</span>`;
    document.getElementById('sendToAiBtn').innerHTML = `${iconHtml('plane', 'btn-icon-plane')}<span>Send to AI</span>`;

    document.getElementById('runBtn').addEventListener('click', () => {
      const btn = document.getElementById('runBtn');
      const subject = document.getElementById('subject').value;
      streamToPanel(window.STREAM_URLS.chapter_assistant, { subject }, 'out-chapter', btn, {
        successToast: 'Chapter overview generated',
        onComplete: () => recordActivity(subject)
      });
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('subject').value = 'Biology';
      setSubjectTheme('Biology');
      clearPanel('out-chapter', 'Chapter overview will appear here…');
    });
    document.getElementById('exportBtn').addEventListener('click', () => {
      exportToPDF('out-chapter', 'Chapter Overview');
    });
    document.getElementById('sendToAiBtn').addEventListener('click', () => {
      const text = document.getElementById('out-chapter').innerText.trim();
      if (!text || text.startsWith('Chapter overview')) {
        showToast('Generate something first', 'warning');
        return;
      }
      const subject = document.getElementById('subject').value;
      window.GlobalChat && window.GlobalChat.injectContent(text, 'chapter', '📖 Chapter: ' + subject);
    });
  </script>
</body>
</html>
