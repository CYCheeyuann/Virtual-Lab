AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Virtual Science Lab Assistant — Streaming Lambda + Bedrock + S3

Parameters:
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin (set to S3 website URL after first deploy)

Globals:
  Function:
    Timeout: 180
    MemorySize: 512
    Runtime: python3.12

Resources:
  # ─── IAM Role ───────────────────────────────────────────────────────────────
  AppBedrockRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-BedrockRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/global.anthropic.claude-sonnet-4-6-20260217-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-sonnet-4-6-20260217-v1:0"

  # ─── Chapter Assistant Lambda ───────────────────────────────────────────────
  ChapterAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/chapter_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Experiment Guide Lambda ────────────────────────────────────────────────
  ExperimentGuideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/experiment_guide/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Science Quiz Lambda ────────────────────────────────────────────────────
  ScienceQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_quiz/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Science Tutor Lambda ──────────────────────────────────────────────────
  ScienceTutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_tutor/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── S3 Frontend Bucket ────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

Outputs:
  ChapterAssistantUrl:
    Value: !GetAtt ChapterAssistantFunctionUrl.FunctionUrl
  ExperimentGuideUrl:
    Value: !GetAtt ExperimentGuideFunctionUrl.FunctionUrl
  ScienceQuizUrl:
    Value: !GetAtt ScienceQuizFunctionUrl.FunctionUrl
  ScienceTutorUrl:
    Value: !GetAtt ScienceTutorFunctionUrl.FunctionUrl
  WebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  BucketName:
    Value: !Ref FrontendBucket
