AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Virtual Science Lab Assistant — Streaming Lambda + Bedrock + S3

Parameters:
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin (set to S3 website URL after first deploy)
  ApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: |
      Optional shared secret. When set, every Lambda Function URL requires
      `X-Api-Key: <value>` on the request. Empty string disables the check.

Globals:
  Function:
    Timeout: 180
    MemorySize: 512
    Runtime: python3.12
    Environment:
      Variables:
        ALLOWED_ORIGIN: !Ref AllowedOrigin
        API_KEY:        !Ref ApiKey

Resources:
  # ─── IAM Role ───────────────────────────────────────────────────────────────
  AppBedrockRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-BedrockRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Claude Haiku 4.5 — invoked through the GLOBAL inference profile
              # from any region (we call it from ap-southeast-1).
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
              # Amazon Titan Image Generator v2 — image generation in us-east-1.
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-image-generator-v2:0"

  # ─── Chapter Assistant Lambda ───────────────────────────────────────────────
  ChapterAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/chapter_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Experiment Guide Lambda ────────────────────────────────────────────────
  ExperimentGuideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/experiment_guide/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Science Quiz Lambda ────────────────────────────────────────────────────
  ScienceQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_quiz/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Science Tutor Lambda ──────────────────────────────────────────────────
  ScienceTutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_tutor/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Safety Assistant Lambda (Streaming) ───────────────────────────────────
  SafetyAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/safety_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── What Happens If Lambda (Streaming) ────────────────────────────────────
  WhatHappensIfFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/what_happens_if/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Image Generator Lambda (Non-Streaming, Nova Canvas + Claude) ──────────
  ImageGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/image_generator/
      Handler: run.sh
      MemorySize: 1024
      Timeout: 300
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          # Claude (text) runs in Singapore via global inference profile.
          BEDROCK_REGION: ap-southeast-1
          MODEL_ID: global.anthropic.claude-haiku-4-5-20251001-v1:0
          # Titan Image Generator v2 in N. Virginia (us-east-1).
          IMAGE_REGION: us-east-1
          IMAGE_MODEL_ID: amazon.titan-image-generator-v2:0
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── S3 Frontend Bucket ────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

Outputs:
  ChapterAssistantUrl:
    Value: !GetAtt ChapterAssistantFunctionUrl.FunctionUrl
  ExperimentGuideUrl:
    Value: !GetAtt ExperimentGuideFunctionUrl.FunctionUrl
  ScienceQuizUrl:
    Value: !GetAtt ScienceQuizFunctionUrl.FunctionUrl
  ScienceTutorUrl:
    Value: !GetAtt ScienceTutorFunctionUrl.FunctionUrl
  SafetyAssistantUrl:
    Value: !GetAtt SafetyAssistantFunctionUrl.FunctionUrl
  WhatHappensIfUrl:
    Value: !GetAtt WhatHappensIfFunctionUrl.FunctionUrl
  ImageGeneratorUrl:
    Value: !GetAtt ImageGeneratorFunctionUrl.FunctionUrl
  WebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  BucketName:
    Value: !Ref FrontendBucket
