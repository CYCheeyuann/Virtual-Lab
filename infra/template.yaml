AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Virtual Science Lab Assistant — Streaming Lambda + Bedrock + S3

Parameters:
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin (set to S3 website URL after first deploy)
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: |
      Deployment environment. Propagated to a tag on every resource so AWS
      Cost Explorer / dashboards can filter by env. Stack-name suffix is
      controlled separately by the deploy workflow so prod can keep its
      legacy stack name unchanged.
  ApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: |
      Optional shared secret. When set, every Lambda Function URL requires
      `X-Api-Key: <value>` on the request. Empty string disables the check.
  BudgetAmountUSD:
    Type: Number
    Default: 50
    Description: |
      Monthly cost budget in USD. Triggers ACTUAL notifications at 80% and
      100%. Bedrock + Lambda + S3 costs are dominated by Bedrock model usage,
      so right-size this to the expected user volume.
  BudgetNotificationEmail:
    Type: String
    Default: ""
    Description: |
      Email address that receives budget threshold notifications. Leave
      empty to skip Budget creation entirely (the rest of the stack still
      deploys).

Conditions:
  HasBudgetEmail: !Not [!Equals [!Ref BudgetNotificationEmail, ""]]

Mappings:
  # Lambda Insights extension layer ARNs by region. Account 580247275435 is
  # the official AWS-managed Lambda Insights publisher. Update the version
  # number from the AWS docs as new layers ship.
  # https://docs.aws.amazon.com/lambda/latest/dg/monitoring-insights.html#monitoring-insights-extension
  RegionToLambdaInsights:
    ap-southeast-1: { LayerArn: "arn:aws:lambda:ap-southeast-1:580247275435:layer:LambdaInsightsExtension:53" }
    us-east-1:      { LayerArn: "arn:aws:lambda:us-east-1:580247275435:layer:LambdaInsightsExtension:53" }
    us-west-2:      { LayerArn: "arn:aws:lambda:us-west-2:580247275435:layer:LambdaInsightsExtension:53" }
    eu-west-1:      { LayerArn: "arn:aws:lambda:eu-west-1:580247275435:layer:LambdaInsightsExtension:53" }

Globals:
  Function:
    Timeout: 180
    MemorySize: 512
    Runtime: python3.12
    Tags:
      Environment: !Ref Environment
      Project: VirtualScienceLab
    Environment:
      Variables:
        ALLOWED_ORIGIN: !Ref AllowedOrigin
        API_KEY:        !Ref ApiKey
        AI_FUNCTION_NAME: !Ref AWS::StackName  # falls back if Lambda doesn't pass an explicit one
        ENVIRONMENT:    !Ref Environment

Resources:
  # ─── IAM Role ───────────────────────────────────────────────────────────────
  AppBedrockRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-BedrockRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        # Lambda Insights writes its CloudWatch metrics + logs through this
        # managed policy. Attached here so any function can opt into Insights
        # by simply adding the layer in its Layers list.
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Claude Haiku 4.5 — invoked through the GLOBAL inference profile
              # from any region (we call it from ap-southeast-1).
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/global.anthropic.claude-haiku-4-5-20251001-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
              # Image generation in us-east-1 — IAM allows BOTH Titan v2 and
              # Nova Canvas so the runtime model can be switched via the
              # IMAGE_MODEL_ID env var alone, no IAM redeploy required.
              # (Titan v2 is Legacy / EOL 2026-06-30; Nova Canvas is the
              # supported successor.)
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-image-generator-v2:0"
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-image-generator-v1"
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-canvas-v1:0"
              # Stability AI SD 3.5 Large in us-west-2 — used by the
              # Scientific Object Generator (Lab Tools redesign).
              # NOTE: account-level model access must also be granted via the
              # Bedrock console (Model access → Stability AI → Stable Diffusion 3.5 Large).
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:us-west-2::foundation-model/stability.sd3-5-large-v1:0"
                  - "arn:aws:bedrock:us-west-2::foundation-model/stability.stable-diffusion-xl-v1"

  # ─── Chapter Assistant Lambda ───────────────────────────────────────────────
  ChapterAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/chapter_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Experiment Guide Lambda ────────────────────────────────────────────────
  ExperimentGuideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/experiment_guide/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Science Quiz Lambda ────────────────────────────────────────────────────
  ScienceQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_quiz/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Flashcard Generator Lambda ─────────────────────────────────────────────
  # Stateless AI card generation: from_text / from_quiz / from_topic.
  # Buffered (non-streaming) — frontend wants the whole deck JSON in one shot.
  # NOTE: ReservedConcurrentExecutions is intentionally NOT set here. AWS
  # enforces a minimum unreserved concurrency of 10 per account, and this
  # account's total Lambda concurrency limit is at or near that floor —
  # any reservation would push unreserved below 10 and CloudFormation
  # refuses the update. To re-enable: open Service Quotas → Lambda →
  # "Concurrent executions", request an increase to ≥ 50, then add
  # `ReservedConcurrentExecutions: 5` back here. See
  # docs/observability-and-cost-controls.md for full guidance.
  FlashcardGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/flashcard_generator/
      Handler: run.sh
      MemorySize: 512
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
        - !FindInMap [RegionToLambdaInsights, !Ref "AWS::Region", LayerArn]
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── Scientific Object Generator Lambda (Lab Tools redesign) ────────────────
  # Three modes: overview (Claude Haiku) → image (Stability SD 3.5 Large in
  # us-west-2) → narrative (Claude Haiku). Strictly sequential per the spec.
  # Memory bumped to 1024 because base64 images can be ~1.5 MB.
  # Timeout 300s — image gen on Stability can take 30-60s.
  # NOTE: ReservedConcurrentExecutions intentionally not set — see comment
  # on FlashcardGeneratorFunction above. Add `ReservedConcurrentExecutions: 5`
  # once the account concurrency quota is raised to ≥ 50.
  ScientificObjectGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/scientific_object_generator/
      Handler: run.sh
      MemorySize: 1024
      Timeout: 300
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
        - !FindInMap [RegionToLambdaInsights, !Ref "AWS::Region", LayerArn]
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── Science Tutor Lambda ──────────────────────────────────────────────────
  # NOTE: ReservedConcurrentExecutions intentionally not set — see comment
  # on FlashcardGeneratorFunction. Add `ReservedConcurrentExecutions: 10`
  # once the account concurrency quota is raised to ≥ 50.
  ScienceTutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/science_tutor/
      Handler: run.sh
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
        - !FindInMap [RegionToLambdaInsights, !Ref "AWS::Region", LayerArn]
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Safety Assistant Lambda (Streaming) ───────────────────────────────────
  SafetyAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/safety_assistant/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── What Happens If Lambda (Streaming) ────────────────────────────────────
  WhatHappensIfFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/what_happens_if/
      Handler: run.sh
      MemorySize: 256
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  # ─── Image Generator Lambda (Non-Streaming, Stability + Claude) ────────────
  # NOTE: ReservedConcurrentExecutions intentionally not set — see comment
  # on FlashcardGeneratorFunction. Add `ReservedConcurrentExecutions: 5`
  # once the account concurrency quota is raised to ≥ 50.
  ImageGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/image_generator/
      Handler: run.sh
      MemorySize: 1024
      Timeout: 300
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
        - !FindInMap [RegionToLambdaInsights, !Ref "AWS::Region", LayerArn]
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          # Claude (text) runs in Singapore via global inference profile.
          BEDROCK_REGION: ap-southeast-1
          MODEL_ID: global.anthropic.claude-haiku-4-5-20251001-v1:0
          # Stability AI SD 3.5 Large in us-west-2.
          # Account 298493766605 has SD 3.5 Marketplace agreement signed; it
          # does NOT have Titan v2 enabled in us-east-1, hence the swap.
          # IAM grants both Titan/Nova ARNs (us-east-1) and SD 3.5 (us-west-2)
          # so to flip back, change just the env vars below.
          IMAGE_REGION: us-west-2
          IMAGE_MODEL_ID: stability.sd3-5-large-v1:0
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── Feedback Collector Lambda (lightweight) ──────────────────────────────
  # Tiny stateless Lambda that records thumbs-up / thumbs-down events as
  # structured CloudWatch logs + an EMF FeedbackCount metric (no DB).
  # 256 MB is more than enough; 30s timeout stays well under the global cap.
  FeedbackCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/feedback_collector/
      Handler: run.sh
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt AppBedrockRole.Arn
      Layers:
        - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:27"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: buffered
          PORT: "8080"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED

  # ─── AWS WAF — Rate Limiting & Abuse Protection ─────────────────────────────
  # Attached to the CloudFront distribution to protect all Lambda Function URLs
  # from unauthenticated abuse. The Function URLs remain AuthType: NONE for now
  # (medium-term plan is AWS_IAM + Cognito), but WAF provides the first real
  # line of defence: per-IP rate limits, geo restrictions if needed, and a
  # baseline managed rule group for known bad inputs.
  #
  # NOTE: WAF for CloudFront MUST be deployed in us-east-1. Since this stack
  # deploys to ap-southeast-1, we use a REGIONAL Web ACL scope attached to
  # CloudFront (CloudFront accepts both REGIONAL and CLOUDFRONT-scoped ACLs
  # only if the ACL is in us-east-1). If your stack already deploys to
  # us-east-1, change Scope to CLOUDFRONT. Otherwise, this ACL must be created
  # in a separate us-east-1 stack or via a custom resource.
  #
  # WORKAROUND: SAM/CloudFormation in a single-region stack cannot create a
  # us-east-1 WAF and attach it to CloudFront in ap-southeast-1 in one
  # template. The pragmatic path is:
  #   1. Deploy THIS template as-is (WAF resource created, not yet attached).
  #   2. Manually attach the Web ACL ARN to the CloudFront distribution via
  #      Console or a separate mini-stack in us-east-1.
  #   3. Medium-term: migrate to a multi-region nested stack or CDK.
  #
  # For now we define the WAF with Scope: REGIONAL so it deploys alongside
  # the rest of the stack without errors, and document the manual attachment
  # step. Once the stack moves to us-east-1 or CDK, change Scope to
  # CLOUDFRONT and add WebACLId to the distribution.

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-waf-acl-v2"
      Description: "Rate limiting and abuse protection for Virtual Science Lab"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-waf"
      Rules:
        # Rule 1: Global rate limit — 100 requests per 5 minutes per IP
        - Name: RateLimitPerIP
          Priority: 1
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-rate-limit"
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
        # Rule 2: Stricter rate limit for image generation paths (most expensive)
        # Matches any request whose URI path contains "image" or "scientific_object"
        - Name: RateLimitExpensiveEndpoints
          Priority: 2
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-rate-limit-expensive"
          Statement:
            RateBasedStatement:
              Limit: 20
              AggregateKeyType: IP
              ScopeDownStatement:
                OrStatement:
                  Statements:
                    - ByteMatchStatement:
                        SearchString: "image"
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: LOWERCASE
                        PositionalConstraint: CONTAINS
                    - ByteMatchStatement:
                        SearchString: "scientific_object"
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: LOWERCASE
                        PositionalConstraint: CONTAINS
        # Rule 3: AWS Managed Rules — Common Rule Set (blocks known bad patterns)
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-aws-managed-common"
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
        # Rule 4: AWS Managed Rules — Known Bad Inputs
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 4
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-aws-managed-bad-inputs"
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet

  # CloudWatch alarm for WAF blocked requests — fires when abuse is detected
  WafBlockedRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-waf-blocked-requests"
      AlarmDescription: ">50 WAF-blocked requests in 5 min — possible abuse attempt."
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: !Sub "${AWS::StackName}-waf-acl-v2"
        - Name: Rule
          Value: ALL
        - Name: Region
          Value: !Ref AWS::Region
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ─── S3 Frontend Bucket ────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: welcome.html
        ErrorDocument: welcome.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ─── CloudFront distribution — fronts the S3 website with HTTPS ─────────────
  # Free TLS cert via *.cloudfront.net default certificate, no custom domain
  # needed. PriceClass_100 keeps cost minimal (US/EU/Canada/Israel/HK edges).
  # First deploy provisioning takes ~10-15 min as the distribution propagates
  # to edge locations; subsequent updates are fast.
  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} — frontend HTTPS"
        DefaultRootObject: welcome.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: S3WebsiteOrigin
            # Use the S3 *website* endpoint (not the REST endpoint) so the
            # IndexDocument / ErrorDocument behaviour configured on the bucket
            # is honoured for clean URLs and SPA-style fallbacks.
            DomainName: !Sub "${FrontendBucket}.s3-website-${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              # S3 website endpoints are HTTP-only; CloudFront speaks HTTPS to
              # the viewer regardless. The bucket itself stays public-read.
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods:  [GET, HEAD]
          Compress: true
          # AWS-managed CachingOptimized policy (TTL 86400, gzip+brotli).
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # SPA-friendly: 403/404 from the bucket falls back to index.html
        # so deep links work even though the static site has multiple pages.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /welcome.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /welcome.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        # WAF attachment: Once the WafWebAcl is deployed to us-east-1 (or
        # this stack is moved there), uncomment the line below:
        # WebACLId: !GetAtt WafWebAcl.Arn

  # ───────────────────────────────────────────────────────────────────────────
  # CloudWatch alarms — the four cost-critical Lambdas get Errors + Throttles
  # coverage; the two image-generation Lambdas additionally get a Duration
  # p99 alarm because Stability calls take 30-60s normally and a sustained
  # creep above 60s indicates a real problem.
  # ───────────────────────────────────────────────────────────────────────────

  # ImageGeneratorFunction
  ImageGeneratorErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-image-generator-errors"
      AlarmDescription: ">5 errors in 5 min on the image generator Lambda."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ImageGeneratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ImageGeneratorThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-image-generator-throttles"
      AlarmDescription: "Lambda invocation throttled. Without per-function reserved concurrency, this fires when the account-wide concurrency limit is exceeded."
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ImageGeneratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ImageGeneratorDurationP99Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-image-generator-duration-p99"
      AlarmDescription: "p99 Lambda duration > 60s — Stability render is slowing down."
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ImageGeneratorFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 60000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ScientificObjectGeneratorFunction
  ScientificObjectGeneratorErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-scientific-object-errors"
      AlarmDescription: ">5 errors in 5 min on the scientific object generator Lambda."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScientificObjectGeneratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ScientificObjectGeneratorThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-scientific-object-throttles"
      AlarmDescription: "Lambda invocation throttled. Account-wide concurrency limit exceeded."
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScientificObjectGeneratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ScientificObjectGeneratorDurationP99Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-scientific-object-duration-p99"
      AlarmDescription: "p99 Lambda duration > 60s — Stability render is slowing down."
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScientificObjectGeneratorFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 60000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ScienceTutorFunction (highest volume, no image step)
  ScienceTutorErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-science-tutor-errors"
      AlarmDescription: ">5 errors in 5 min on the chat Lambda."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScienceTutorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ScienceTutorThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-science-tutor-throttles"
      AlarmDescription: "Tutor invocation throttled. Account-wide concurrency limit exceeded — likely a chat storm."
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScienceTutorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # FlashcardGeneratorFunction
  FlashcardGeneratorErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-flashcard-generator-errors"
      AlarmDescription: ">5 errors in 5 min on the flashcard generator Lambda."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FlashcardGeneratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  FlashcardGeneratorThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-flashcard-generator-throttles"
      AlarmDescription: "Lambda invocation throttled. Account-wide concurrency limit exceeded."
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref FlashcardGeneratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ───────────────────────────────────────────────────────────────────────────
  # Monthly cost budget — only created when BudgetNotificationEmail is set.
  # Ships actual-cost notifications at 80% and 100% of the configured limit.
  # Forecasted-cost notifications can be added later by appending more
  # NotificationsWithSubscribers entries here.
  # ───────────────────────────────────────────────────────────────────────────
  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Condition: HasBudgetEmail
    Properties:
      Budget:
        BudgetName: !Sub "${AWS::StackName}-monthly"
        BudgetLimit:
          Amount: !Ref BudgetAmountUSD
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetNotificationEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetNotificationEmail

Outputs:
  ChapterAssistantUrl:
    Value: !GetAtt ChapterAssistantFunctionUrl.FunctionUrl
  ExperimentGuideUrl:
    Value: !GetAtt ExperimentGuideFunctionUrl.FunctionUrl
  ScienceQuizUrl:
    Value: !GetAtt ScienceQuizFunctionUrl.FunctionUrl
  ScienceTutorUrl:
    Value: !GetAtt ScienceTutorFunctionUrl.FunctionUrl
  FlashcardGeneratorUrl:
    Value: !GetAtt FlashcardGeneratorFunctionUrl.FunctionUrl
  ScientificObjectGeneratorUrl:
    Value: !GetAtt ScientificObjectGeneratorFunctionUrl.FunctionUrl
  FeedbackCollectorUrl:
    Value: !GetAtt FeedbackCollectorFunctionUrl.FunctionUrl
  SafetyAssistantUrl:
    Value: !GetAtt SafetyAssistantFunctionUrl.FunctionUrl
  WhatHappensIfUrl:
    Value: !GetAtt WhatHappensIfFunctionUrl.FunctionUrl
  ImageGeneratorUrl:
    Value: !GetAtt ImageGeneratorFunctionUrl.FunctionUrl
  WebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL
  CloudFrontUrl:
    Description: HTTPS URL of the CloudFront distribution (use this in production)
    Value: !Sub "https://${WebsiteDistribution.DomainName}"
  CloudFrontDistributionId:
    Description: Distribution ID — needed for cache invalidations after S3 sync
    Value: !Ref WebsiteDistribution
  BucketName:
    Value: !Ref FrontendBucket
  WafWebAclArn:
    Description: "WAF Web ACL ARN — attach to CloudFront once deployed to us-east-1"
    Value: !GetAtt WafWebAcl.Arn
